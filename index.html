<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報システム 認証</title>
  <!-- LINEのLIFF SDKを読み込み -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div style="text-align: center; margin-top: 50px;">
    <p>認証中...しばらくお待ちください。</p>
  </div>

  <script>
    // ⭐️ あなたのLIFF IDをここに貼り付けます
    const LIFF_ID = "YOUR_LIFF_ID_HERE";
    // ⭐️ あなたのGoogleフォームのURL（「送信」から取得できる回答用URL）をここに貼り付けます
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1G5UF4CQo2SlHn2WkC95od-XEgPy-scQwbLFYP0iHp3E/viewform";

    async function main() {
      await liff.init({ liffId: LIFF_ID });
      
      if (!liff.isLoggedIn()) {
        liff.login(); // LINEでログインしていない場合はログイン画面を出す
      } else {
        // ログイン成功後、ユーザープロフィールを取得
        const profile = await liff.getProfile();
        const userId = profile.userId; // ⭐️ ここでLINEユーザーID（Uxxxx）を確実に取得！

        // LINEユーザーIDをGoogleフォームの特定の質問（テキスト入力欄）に自動入力させて遷移
        // ※ entry.XXXXX 部分は、ご自身のGoogleフォームの該当質問の入力IDに変更する必要があります
        const redirectUrl = `${GOOGLE_FORM_URL}?entry.123456789=${encodeURIComponent(userId)}`;
        
        window.location.href = redirectUrl;
      }
    }
    main();
  </script>
</body>
</html>
