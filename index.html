<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報システム 認証</title>
  <!-- LINEのLIFF SDKを読み込み -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div style="text-align: center; margin-top: 50px; font-family: sans-serif; color: #333;">
    <p style="font-size: 16px;">日報システムに接続中...<br>しばらくお待ちください。</p>
  </div>

  <script>
    // ⭐️ LINE DevelopersのLIFF画面に表示されている「LIFF ID」を、以下の" " の中に貼り付けてください
    const LIFF_ID = "ここにあなたのLIFF ID（例: 20xxxxxx-xxxxxx）を貼り付けます";

    // ご提示いただいたGoogleフォームのURLと鍵穴番号を完全に組み込みました
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfH4GsxmXC8uxw_qxB01p7tNJxLFTKj4Glu0-cAxcfQxqCUYQ/viewform";

    async function main() {
      // LIFFの初期化
      await liff.init({ liffId: LIFF_ID });
      
      // LINEでログインしていなければログイン画面へ誘導
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        // ログイン成功後、送信者のLINEプロフィールからユーザーIDを取得
        const profile = await liff.getProfile();
        const userId = profile.userId;

        // LINEユーザーIDを指定の入力欄（entry.1404184595）に自動で埋め込んだURLを作成
        const redirectUrl = `${GOOGLE_FORM_URL}?usp=pp_url&entry.1404184595=${encodeURIComponent(userId)}`;
        
        // 自動入力された状態のGoogleフォームへ瞬間移動（リダイレクト）
        window.location.href = redirectUrl;
      }
    }
    
    // プログラムの実行
    main().catch((err) => {
      console.error("LIFF初期化エラー:", err);
    });
  </script>
</body>
</html>
